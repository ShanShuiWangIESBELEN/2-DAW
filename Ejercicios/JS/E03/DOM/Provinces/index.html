<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provinces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <h1>Provinces</h1>
            <div class="mb-3 w-50 d-flex gap-2">
                <select class="form-select" name="order" id="orderBy">
                    <option value="name">name</option>
                    <option value="town">town</option>
                </select>
                <select class="form-select" name="direction" id="orderDirection">
                    <option value="asc">asc</option>
                    <option value="desc">desc</option>
                </select>
            </div>

            <div class="container">
                <div class="accordion" id="provincias">
                    <!-- Aqui se muestran las provincias -->
                </div>
            </div>


            <script src="provinces.js"></script>
            <script src="control.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"></script>

</html>
