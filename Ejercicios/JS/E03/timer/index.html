<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Timers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .task {
            display: inline-block;
            width: 200px;
            margin: 10px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .task.active {
            background-color: #dff0d8;
        }

        .task.break {
            background-color: #fcf8e3;
        }

        .task.done {
            background-color: #f2dede;
        }

        .global-timer {
            font-size: 2em;
            margin-bottom: 20px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
   
    </style>
</head>

<body>
    <div class="global-timer">00:00</div>
    <div id="task"></div>
    <button id="start">Start</button>
    <button id="stop">Stop</button>

    <script src="Amano.js"></script>
</body>

</html>
